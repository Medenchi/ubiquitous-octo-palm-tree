# .github/workflows/monitor.yml

name: Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: monitor
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Load history cache
        uses: actions/cache@v4
        with:
          path: history.json
          key: history-${{ github.run_id }}
          restore-keys: history-

      - name: Run checks
        run: python generate.py

      - name: Save history to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          cp history.json history_backup.json || true
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          cp history_backup.json history.json || true
          git add history.json
          git diff --cached --quiet || git commit -m "update history $(date -u +%H:%M)"
          git push || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    needs: check
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
